name: Testkit

on:
  push:
    branches: [main]
  pull_request:

jobs:
  testkit:
    name: testkit (ruby ${{ matrix.ruby }}${{ matrix.force_mri && ' [mri flavor]' || '' }})
    runs-on: ubuntu-latest
    # JRuby rows are continue-on-error: native JRuby flavor has no code
    # yet (lib/jruby/ empty), and the MRI-on-JRuby include row below is
    # exercised here for the first time.
    continue-on-error: ${{ startsWith(matrix.ruby, 'jruby') }}

    # contents: write lets the auto-update step push baseline refreshes
    # back to the PR branch via the default GITHUB_TOKEN.
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        ruby:
          - "3.4"
          - "jruby-10.1.0.0"
        force_mri: [false]
        include:
          # MRI flavor on JRuby — NEO4J_DRIVER_FORCE_MRI=1 flips the
          # Gemfile's `gemspec` directive to pin the MRI gemspec.
          - ruby: "jruby-10.1.0.0"
            force_mri: true

    services:
      neo4j:
        image: neo4j:5.26.21-enterprise
        env:
          NEO4J_AUTH: neo4j/password
          NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "cypher-shell -u neo4j -p password 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 30s

    env:
      TEST_DRIVER_NAME: ruby
      TEST_NEO4J_HOST: localhost
      TEST_NEO4J_USER: neo4j
      TEST_NEO4J_PASS: password
      # 2-segment form: testkit's test_agent_string compares the first
      # two dot-segments of the server agent ("Neo4j/5.26.21" -> "Neo4j/5.26")
      # against "Neo4j/" + this value. Patch number must be omitted.
      TEST_NEO4J_VERSION: '5.26'
      TESTKIT_PATH: ${{ github.workspace }}/../testkit
      # Per-impl baseline: MRI and JRuby progress independently.
      # The MRI-on-JRuby flavor uses the MRI baseline since it runs MRI code.
      BASELINE: ${{ github.workspace }}/.github/testkit-baseline-${{ (startsWith(matrix.ruby, 'jruby') && !matrix.force_mri) && 'jruby' || 'mri' }}.txt
      # Empty string when force_mri is false; '1' on the include row.
      NEO4J_DRIVER_FORCE_MRI: ${{ matrix.force_mri && '1' || '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Pin testkit so upstream changes can't make our baseline gate
      # fail through no fault of ours. Bump intentionally when needed.
      # Shallow-fetch just the pinned commit (no full history needed).
      - name: Clone testkit
        env:
          TESTKIT_REF: a233c3f32c9e7db33d856345c4c98f487d15aabb
        run: |
          git init "$TESTKIT_PATH"
          git -C "$TESTKIT_PATH" remote add origin https://github.com/neo4j-drivers/testkit.git
          git -C "$TESTKIT_PATH" fetch --depth 1 origin "$TESTKIT_REF"
          git -C "$TESTKIT_PATH" checkout FETCH_HEAD

      - name: Install testkit Python deps
        run: pip install -Ur "$TESTKIT_PATH/requirements.txt"

      # bin/run-testkit returns the unittest exit code (non-zero on any
      # failure). We have known failures, so that exit code isn't useful
      # as a gate — the per-test baseline check below is the real gate.
      - name: Run testkit
        id: testkit
        continue-on-error: true
        run: ./bin/run-testkit neo4j

      - name: Locate run log
        id: log
        if: always()
        run: |
          LOG=$(ls -td /tmp/testkit-run-* 2>/dev/null | head -1)/run.log
          test -f "$LOG" || { echo "no run.log produced"; exit 1; }
          echo "log=$LOG" >> "$GITHUB_OUTPUT"

      - name: Summarise counts
        if: always()
        run: |
          LOG="${{ steps.log.outputs.log }}"
          PASS=$(grep -cE ' \.\.\. ok$' "$LOG" || true)
          FAIL=$(grep -cE ' \.\.\. FAIL$' "$LOG" || true)
          ERROR=$(grep -cE ' \.\.\. ERROR$' "$LOG" || true)
          SKIP=$(grep -cE 'skipped' "$LOG" || true)
          {
            echo "## Testkit results"
            echo ""
            echo "| Pass | Fail | Error | Skip |"
            echo "|-----:|-----:|------:|-----:|"
            echo "| $PASS | $FAIL | $ERROR | $SKIP |"
          } >> "$GITHUB_STEP_SUMMARY"

      # The real gate: every test in $BASELINE (the impl-specific
      # testkit-baseline-{mri,jruby}.txt) MUST be in the current pass
      # set. Catches "fixed test A, regressed test B" cases that a
      # simple count comparison would miss.
      - name: Regression gate (baseline diff)
        if: always()
        run: |
          LOG="${{ steps.log.outputs.log }}"
          # `sort -u` because testkit can report a single test id more
          # than once in a single run (e.g. v3/v4 suites both assert the
          # same Bolt-version-agnostic test). Without -u a passing dup
          # would surface as a phantom "new pass" against the baseline.
          grep -E ' \.\.\. ok$' "$LOG" | sed -E 's/ \.\.\. ok$//' | sort -u > /tmp/current-pass.txt
          # Strip comment / blank lines from baseline
          grep -vE '^(#|$)' "$BASELINE" | sort -u > /tmp/baseline.txt

          # Tests in baseline that are NOT in current pass → regression
          REGRESSED=$(comm -23 /tmp/baseline.txt /tmp/current-pass.txt)
          # Tests in current pass that are NOT in baseline → new wins
          NEW=$(comm -13 /tmp/baseline.txt /tmp/current-pass.txt)

          {
            echo ""
            if [ -n "$NEW" ]; then
              echo "### ✅ New passing tests (consider adding to baseline)"
              echo '```'
              echo "$NEW"
              echo '```'
            fi
            if [ -n "$REGRESSED" ]; then
              echo "### ❌ Regressed tests (previously in baseline, now not passing)"
              echo '```'
              echo "$REGRESSED"
              echo '```'
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          if [ -n "$REGRESSED" ]; then
            echo "::error::$(echo "$REGRESSED" | wc -l | tr -d ' ') baseline test(s) no longer pass"
            echo "$REGRESSED" | sed 's/^/::error::regressed: /'
            exit 1
          fi
          echo "All baseline tests still pass."

      # Auto-refresh the baseline file when this run finds tests that pass
      # but aren't in $BASELINE yet. Pushes back to the PR branch via the
      # default GITHUB_TOKEN, which is no-CI-loop-by-design.
      #
      # Guards:
      # - only on pull_request events (skip pushes to main)
      # - skip fork PRs (GITHUB_TOKEN can't push to forks)
      # - skip the mri-flavor JRuby row (MRI 3.4 owns mri.txt — letting
      #   both rows write the same file would race / disagree on env-
      #   specific passes)
      # - success() means the regression gate above didn't exit 1
      - name: Auto-refresh baseline with new passing tests
        if: |
          success()
          && github.event_name == 'pull_request'
          && github.event.pull_request.head.repo.full_name == github.repository
          && !matrix.force_mri
        run: |
          LOG="${{ steps.log.outputs.log }}"
          grep -E ' \.\.\. ok$' "$LOG" | sed -E 's/ \.\.\. ok$//' | sort -u > /tmp/current-pass.txt
          grep -vE '^(#|$)' "$BASELINE" | sort -u > /tmp/baseline.txt
          NEW=$(comm -13 /tmp/baseline.txt /tmp/current-pass.txt)
          if [ -z "$NEW" ]; then
            echo "No new passing tests; baseline already up to date."
            exit 0
          fi
          echo "Adding to $(basename "$BASELINE"):"
          echo "$NEW" | sed 's/^/  + /'

          # Preserve the header (leading # comments + blank line); append
          # the merged-and-sorted pass set.
          awk '/^[^#]/ && NF { exit } { print }' "$BASELINE" > /tmp/header.txt
          {
            cat /tmp/header.txt
            cat /tmp/baseline.txt /tmp/current-pass.txt | sort -u
          } > /tmp/new-baseline.txt
          mv /tmp/new-baseline.txt "$BASELINE"

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "$BASELINE"
          git commit -m "ci: refresh $(basename "$BASELINE") with new passing tests"

          # Retry on race: concurrent matrix row (different baseline
          # file but same branch) or author pushing during CI.
          BRANCH="${{ github.event.pull_request.head.ref }}"
          for attempt in 1 2 3; do
            if git pull --rebase --autostash origin "$BRANCH" \
               && git push origin "HEAD:$BRANCH"; then
              exit 0
            fi
            echo "Push attempt $attempt failed; retrying after backoff…"
            sleep $((attempt * 3))
          done
          echo "::error::Failed to push baseline refresh after 3 retries"
          exit 1

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # Suffix per-matrix-row so artifacts don't overwrite each other.
          # actions/upload-artifact@v4 errors on duplicate names rather than
          # silently merging, so distinct names are required.
          name: testkit-run-log-${{ matrix.ruby }}${{ matrix.force_mri && '-mri' || '' }}
          path: ${{ steps.log.outputs.log }}
          if-no-files-found: ignore

      - name: Upload backend log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testkit-backend-log-${{ matrix.ruby }}${{ matrix.force_mri && '-mri' || '' }}
          path: /tmp/testkit-run-*/backend.log
          if-no-files-found: ignore
