name: Testkit (full matrix, manual)

# Manual-only — runs the full testkit suite (stub + integration across
# the 10 hardcoded Neo4j configs + TLS) per driver flavour. Cost is
# substantial (~50 min per row, 3 rows in parallel) so this is
# never triggered by push/PR. Use it to self-test the docker glue
# against the matrix the Neo4j drivers team's TeamCity nightly would
# exercise, before asking them to wire us into their pipeline.
on:
  workflow_dispatch:
    inputs:
      configs:
        description: |
          Optional space-separated list to narrow the testkit Neo4j
          configs (e.g., "4.4-enterprise-neo4j 5.26-enterprise-cluster-neo4j").
          Leave blank to run the full 10-config matrix.
        required: false
        default: ''

jobs:
  testkit-full:
    name: testkit-full (${{ matrix.flavor }})
    # Restrict the dispatch to main so we don't accidentally burn an
    # hour of runner minutes on every feature branch.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    # All rows are continue-on-error — the workflow's purpose is to
    # surface signal, not gate merges. Pre-handoff smoke test.
    continue-on-error: true
    # 3 rows × ~50 min = generous ceiling. Cap so a hung job doesn't
    # eat 6 hours of minutes silently.
    timeout-minutes: 90

    strategy:
      fail-fast: false
      matrix:
        include:
          - flavor: mri
            base_image: ruby:4.0-slim
            force_mri: ''
          - flavor: jruby
            base_image: jruby:10.1.0.0-jdk21
            force_mri: ''
          - flavor: mri-on-jruby
            base_image: jruby:10.1.0.0-jdk21
            force_mri: '1'

    env:
      TEST_DRIVER_NAME: ruby
      TEST_DRIVER_REPO: ${{ github.workspace }}
      TESTKIT_DRIVER_BUILD_ARG_BASE_IMAGE: ${{ matrix.base_image }}
      TESTKIT_DRIVER_BUILD_ARG_NEO4J_DRIVER_FORCE_MRI: ${{ matrix.force_mri }}
      # Use the Rust boltstub for the STUB_TESTS portion. testkit's
      # runner image ships /usr/local/bin/boltstub; with TEST_RUSTY_STUB
      # truthy tests/stub/shared.py spawns the binary instead of
      # `python -m boltstub`. 2-3× speedup on the stub suite per the
      # testkit authors. Matches testkit-stub.yml. (No effect on
      # INTEGRATION/TLS phases which don't use the bolt stub server.)
      TEST_RUSTY_STUB: 'true'
      # Without this, testkit's run_fail_wrapper short-circuits on the
      # first failing suite or first config with failing tests, so the
      # full matrix never actually runs. The point of this workflow is
      # the full pass — keep going past failures.
      TEST_RUN_ALL_TESTS: 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Clone pinned testkit
        run: |
          REF=$(python3 -c "import json; print(json.load(open('testkit/testkit.json'))['testkit']['ref'])")
          mkdir -p "$RUNNER_TEMP/testkit"
          git -C "$RUNNER_TEMP/testkit" init
          git -C "$RUNNER_TEMP/testkit" remote add origin https://github.com/neo4j-drivers/testkit.git
          git -C "$RUNNER_TEMP/testkit" fetch --depth 1 origin "$REF"
          git -C "$RUNNER_TEMP/testkit" checkout FETCH_HEAD
          echo "TESTKIT_PATH=$RUNNER_TEMP/testkit" >> "$GITHUB_ENV"

      - name: Install testkit Python deps
        run: pip install -Ur "$TESTKIT_PATH/requirements.txt" teamcity-messages

      # Everything testkit knows how to run, except STRESS (long-running
      # by design, not what we want from a smoke test). main.py iterates
      # Neo4j configs internally for INTEGRATION/TLS/TESTKIT_TESTS;
      # STUB runs once.
      - name: Run testkit (full)
        id: testkit
        # Pass the user input via env so it goes through shell parsing
        # rather than ${{ }} text expansion. The latter would happily
        # execute `foo"; rm -rf $HOME #` as shell. The env var stays a
        # single string until `read -ra` parses it into the args array.
        env:
          CONFIGS: ${{ inputs.configs }}
        run: |
          set -o pipefail
          cd "$TESTKIT_PATH"
          ARGS=(--tests TESTKIT_TESTS INTEGRATION_TESTS STUB_TESTS TLS_TESTS)
          if [ -n "${CONFIGS:-}" ]; then
            # shellcheck disable=SC2206  # space-split is the input contract
            read -ra cfgs <<< "$CONFIGS"
            ARGS+=(--configs "${cfgs[@]}")
          fi
          python3 main.py "${ARGS[@]}" 2>&1 | tee "$RUNNER_TEMP/run.log"

      # No regression gate here — this workflow is informational.
      # Build a per-suite breakdown by scanning testkit's
      # `>>> Start test suite: <name>` / `>>> End test suite: <name>`
      # markers emitted around each phase (stub / TLS / per-Neo4j-config
      # integration). Counts are pass/fail/error/skip per suite.
      - name: Per-suite summary
        if: always()
        shell: bash
        run: |
          LOG="$RUNNER_TEMP/run.log"
          {
            echo "## testkit-full (${{ matrix.flavor }}) results"
            echo ""
            echo "| Suite | Pass | Fail | Error | Skip |"
            echo "|---|---:|---:|---:|---:|"
            awk '
              # Match the marker anywhere on the line — the testkit print
              # order sometimes glues it onto the tail of a preceding
              # subprocess line (no trailing newline on the prior write,
              # e.g. the docker run command list for a second cluster
              # core). Take everything after the marker as the suite name.
              # (No apostrophes — the awk is in a bash single-quoted string.)
              match($0, />>> Start test suite: /) {
                in_suite = 1
                suite = substr($0, RSTART + RLENGTH)
                p = f = e = s = 0
                next
              }
              match($0, />>> End test suite: /) {
                if (in_suite) {
                  printf "| %s | %d | %d | %d | %d |\n", suite, p, f, e, s
                  in_suite = 0
                }
                next
              }
              !in_suite { next }
              / \.\.\. ok$/      { p++; next }
              /^ok$/             { p++; next }
              / \.\.\. FAIL$/    { f++; next }
              /^FAIL$/           { f++; next }
              / \.\.\. ERROR$/   { e++; next }
              /^ERROR$/          { e++; next }
              /skipped/          { s++ }
            ' "$LOG"
            echo ""
            # Row-level totals — if testkit ever drops the suite markers
            # this still gives a usable signal.
            PASS=$(awk '/ \.\.\. ok$/ { c++; next } /^ok$/ { c++ } END { print c+0 }' "$LOG")
            FAIL=$(awk '/ \.\.\. FAIL$/ { c++; next } /^FAIL$/ { c++ } END { print c+0 }' "$LOG")
            ERROR=$(awk '/ \.\.\. ERROR$/ { c++; next } /^ERROR$/ { c++ } END { print c+0 }' "$LOG")
            SKIP=$(grep -cE 'skipped' "$LOG" || true)
            echo "**Totals:** ${PASS} pass · ${FAIL} fail · ${ERROR} error · ${SKIP} skip"
          } >> "$GITHUB_STEP_SUMMARY"

      # Extract a sorted pass list for this run so the next dispatch can
      # diff against it — see the "Diff vs last full run" step below.
      - name: Build pass list
        if: always()
        shell: bash
        run: |
          awk '
            function canon(s,    op, cl, head, inner, suffix) {
              op = index(s, " (")
              if (!op) return s
              cl = length(s)
              if (substr(s, cl, 1) != ")") return s
              head = substr(s, 1, op - 1)
              inner = substr(s, op + 2, cl - op - 2)
              suffix = "." head
              if (length(inner) < length(suffix) ||
                  substr(inner, length(inner) - length(suffix) + 1) != suffix) {
                return head " (" inner suffix ")"
              }
              return s
            }
            function tag(s) { return suite ? suite "::" s : s }
            function emit_pass(s,    n, parts, i) {
              n = split(s, parts, / \.\.\. /)
              for (i = 1; i <= n; i++) if (parts[i] ~ /\)$/) print tag(canon(parts[i]))
            }
            # See per-suite summary above — match anywhere, not just at line start.
            match($0, />>> Start test suite: /) { suite = substr($0, RSTART + RLENGTH); next }
            match($0, />>> End test suite: /)   { suite = ""; next }
            / \.\.\. ok$/      { sub(/ \.\.\. ok$/, ""); emit_pass($0); pending=""; next }
            / \.\.\. FAIL$/    { pending=""; next }
            / \.\.\. ERROR$/   { pending=""; next }
            / \.\.\. skipped/  { pending=""; next }
            / \.\.\. /         { pending=$0; next }
            /^ok$/             { if (pending) { emit_pass(pending); pending="" } }
          ' "$RUNNER_TEMP/run.log" | sort -u > "$RUNNER_TEMP/pass-list.txt"
          echo "Captured $(wc -l < "$RUNNER_TEMP/pass-list.txt") unique passes."

      # Compare against the previous run on the SAME ref (so a feature
      # branch only diffs against its own history, not noise from main).
      # Comparing across branches would surface differences in code, not
      # differences in test stability — which is what we want this to
      # signal. Best-effort: silently skip on first run for a ref.
      - name: Diff vs last full run on this ref
        if: always()
        env:
          REF: ${{ github.ref_name }}
          ARTIFACT_NAME: testkit-full-pass-list-${{ matrix.flavor }}
          # gh CLI needs an auth token. GITHUB_TOKEN's default scope
          # covers actions read/write on this repo.
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          # Find the most recent COMPLETED run of THIS workflow on THIS ref
          # that isn't this run itself.
          PREV=$(gh run list --workflow testkit-full.yml --branch "$REF" \
                             --status completed --limit 5 \
                             --json databaseId,createdAt \
                  | python3 -c "
          import sys, json, os
          runs = json.load(sys.stdin)
          this = os.environ.get('GITHUB_RUN_ID', '')
          for r in runs:
              if str(r['databaseId']) != this:
                  print(r['databaseId'])
                  break
          ")
          if [ -z "$PREV" ]; then
            echo "No previous run on $REF — nothing to diff against."
            exit 0
          fi
          echo "Previous run on $REF: $PREV"
          PREV_DIR="$RUNNER_TEMP/prev"
          mkdir -p "$PREV_DIR"
          if ! gh run download "$PREV" -n "$ARTIFACT_NAME" -D "$PREV_DIR" 2>/dev/null; then
            echo "Previous run had no $ARTIFACT_NAME artifact — first run for this flavor on this ref?"
            exit 0
          fi
          NEW_GONE=$(comm -23 "$PREV_DIR/pass-list.txt" "$RUNNER_TEMP/pass-list.txt" | head -200)
          NEW_PASS=$(comm -13 "$PREV_DIR/pass-list.txt" "$RUNNER_TEMP/pass-list.txt" | head -200)
          {
            echo ""
            echo "### Diff vs run \`$PREV\` on \`$REF\`"
            echo ""
            if [ -n "$NEW_GONE" ]; then
              echo "**Tests that stopped passing ($(echo "$NEW_GONE" | wc -l | tr -d ' ')):**"
              echo '```'
              echo "$NEW_GONE"
              echo '```'
            fi
            if [ -n "$NEW_PASS" ]; then
              echo "**Newly passing ($(echo "$NEW_PASS" | wc -l | tr -d ' ')):**"
              echo '```'
              echo "$NEW_PASS"
              echo '```'
            fi
            [ -z "$NEW_GONE$NEW_PASS" ] && echo "No change in the pass set."
          } >> "$GITHUB_STEP_SUMMARY"
        shell: bash

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testkit-full-run-log-${{ matrix.flavor }}
          path: ${{ runner.temp }}/run.log
          if-no-files-found: ignore

      # The pass list is what the next dispatch on this ref diffs against.
      - name: Upload pass list
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testkit-full-pass-list-${{ matrix.flavor }}
          path: ${{ runner.temp }}/pass-list.txt
          if-no-files-found: ignore

      - name: Upload testkit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testkit-full-artifacts-${{ matrix.flavor }}
          path: ${{ env.TESTKIT_PATH }}/artifacts/
          if-no-files-found: ignore
