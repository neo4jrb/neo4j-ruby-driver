name: Driver specs

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rspec:
    name: rspec (ruby ${{ matrix.ruby }} / neo4j ${{ matrix.neo4j }})
    runs-on: ubuntu-latest
    # The native JRuby row is continue-on-error: it runs lib/jruby/ (the
    # Java-driver wrapper). The MRI codebase (lib/mri/) is CRuby-only since
    # the pipeline-first refactor — its `async` reactor is unsupported on
    # JRuby — so there is no mri-on-jruby row; MRI is covered by the CRuby
    # rows below.
    continue-on-error: ${{ startsWith(matrix.ruby, 'jruby') }}

    strategy:
      fail-fast: false
      matrix:
        ruby:
          - "3.4"
          - "4.0"
          - "jruby-10.1.0.0"
        neo4j:
          - "4.4.48"
          - "5.26.25"
          - "2026.04.0"

    services:
      neo4j:
        image: neo4j:${{ matrix.neo4j }}-enterprise
        env:
          NEO4J_AUTH: neo4j/password
          NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "cypher-shell -u neo4j -p password 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 20
          --health-start-period 30s

    env:
      TEST_NEO4J_URL: bolt://localhost:7687
      TEST_NEO4J_USER: neo4j
      TEST_NEO4J_PASS: password
      # Serialise gem installs. setup-ruby's `bundler-cache: true` runs
      # `bundle install --jobs 4` by default; on JRuby the parallel
      # workers race on the jar-dependencies post_install hook for the
      # path-source gem (the hook calls back into ruby-maven before
      # ruby-maven has finished extracting deps.lst / polyglot.jar).
      # No-op on MRI (no hook); a few seconds slower than parallel but
      # correct everywhere — matches testkit/build.py for the same
      # reason. Cf. PR #303 commit 670dec3 fix in testkit/build.py.
      BUNDLE_JOBS: '1'

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run RSpec
        run: bundle exec rspec --format progress
