name: Specs

on:
  push:
    branches: [ 5.0, 6.x ]
  pull_request:
    branches: [ 5.0, 6.x ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    continue-on-error: false
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        ruby: [ jruby, ruby ]
        neo4j: [ 4.4.48, 5.26.21, 2026.01.4 ]
        include:
          - ruby: jruby
            java-version: 21
    env:
      NEO4J_VERSION: ${{ matrix.neo4j }}
    steps:
      - name: Start neo4j
        run: docker run --name neo4j --env NEO4J_AUTH=neo4j/password --env NEO4J_ACCEPT_LICENSE_AGREEMENT=yes -p7687:7687 -p7474:7474 -v `pwd`/tmp:/var/lib/neo4j/import --rm neo4j:${{ matrix.neo4j }}-enterprise &

      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      # Needed until runner permissions issue is resolved:
      # https://github.com/actions/runner-images/issues/13647
      - name: Fix gem directory permissions
        run: sudo chmod +t $(ruby -e 'puts Gem.default_dir')/gems

      - name: Install ruby-maven
        run: gem install ruby-maven

      - name: Create .m2 directory
        run: mkdir -p $HOME/.m2

      - name: Cache maven artifacts
        uses: actions/cache@v3
        with:
          key: 'maven'
          path: ~/.m2/repository

      - name: Set up Java
        uses: actions/setup-java@v4
        if: matrix.java-version
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java-version }}

      - name: Install dependencies
        run: bin/setup

      - name: Wait for neo4j
        run: while [ $((curl localhost:7474/ > /dev/null 2>&1); echo $?) -ne 0 ]; do sleep 1; done

      - name: Run tests
        run: bundle exec rspec -t ~csv
