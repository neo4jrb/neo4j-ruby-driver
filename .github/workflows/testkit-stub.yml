name: Testkit (stub)

on:
  push:
    branches: [main]
  pull_request:
  # Re-triggered by the auto-refresh step in the postprocess action
  # after it pushes a baseline update — see "Re-trigger CI on the
  # bot's commit" there. workflow_dispatch is the only way for the
  # composite action to fire a fresh run that's tied to the just-
  # pushed commit (GITHUB_TOKEN pushes don't fire pull_request).
  workflow_dispatch:

jobs:
  testkit-stub:
    name: testkit-stub (ruby ${{ matrix.ruby }}${{ matrix.force_mri && ' [mri flavor]' || '' }})
    runs-on: ubuntu-latest
    # JRuby rows are continue-on-error: native JRuby flavor has no code
    # yet (lib/jruby/ empty), and the MRI-on-JRuby include row below is
    # exercised here for the first time.
    continue-on-error: ${{ startsWith(matrix.ruby, 'jruby') }}

    # contents: write — lets the auto-update step push baseline
    # refreshes back to the PR branch via the default GITHUB_TOKEN.
    # actions: write — lets the same step `gh workflow run` a fresh
    # CI run against the bot's commit so PR-checks UI gets a status.
    permissions:
      contents: write
      actions: write

    strategy:
      fail-fast: false
      matrix:
        ruby:
          - "3.4"
          - "jruby-10.1.0.0"
        force_mri: [false]
        include:
          - ruby: "jruby-10.1.0.0"
            force_mri: true

    env:
      TEST_DRIVER_NAME: ruby
      TESTKIT_PATH: ${{ github.workspace }}/../testkit
      # Per-impl baseline: MRI and JRuby progress independently.
      # The MRI-on-JRuby flavor uses the MRI baseline since it runs MRI code.
      BASELINE: ${{ github.workspace }}/.github/testkit-stub-baseline-${{ (startsWith(matrix.ruby, 'jruby') && !matrix.force_mri) && 'jruby' || 'mri' }}.txt
      # Empty string when force_mri is false; '1' on the include row.
      NEO4J_DRIVER_FORCE_MRI: ${{ matrix.force_mri && '1' || '' }}

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Pin testkit so upstream changes can't make our baseline gate
      # fail through no fault of ours. Bump intentionally when needed.
      # Shallow-fetch just the pinned commit (no full history needed).
      - name: Clone testkit
        env:
          TESTKIT_REF: a233c3f32c9e7db33d856345c4c98f487d15aabb
        run: |
          git init "$TESTKIT_PATH"
          git -C "$TESTKIT_PATH" remote add origin https://github.com/neo4j-drivers/testkit.git
          git -C "$TESTKIT_PATH" fetch --depth 1 origin "$TESTKIT_REF"
          git -C "$TESTKIT_PATH" checkout FETCH_HEAD

      - name: Install testkit Python deps
        run: pip install -Ur "$TESTKIT_PATH/requirements.txt"

      # tests/stub uses an internal boltstub server (testkit/boltstub),
      # not a real Neo4j — no service container needed.
      - name: Run testkit stub suite
        id: testkit
        continue-on-error: true
        run: ./bin/run-testkit stub

      - uses: ./.github/actions/testkit-postprocess
        id: postprocess
        if: always()
        with:
          target_label: stub
          baseline_path: ${{ env.BASELINE }}
          # MRI 3.4 owns mri.txt; the JRuby[mri-flavor] include row
          # runs the same code path so it must not push baseline
          # updates. JRuby native owns jruby.txt.
          auto_refresh_enabled: ${{ !matrix.force_mri }}
          workflow_filename: testkit-stub.yml

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # Suffix per-matrix-row so artifacts don't overwrite each other.
          # actions/upload-artifact@v4 errors on duplicate names rather than
          # silently merging, so distinct names are required.
          name: testkit-stub-run-log-${{ matrix.ruby }}${{ matrix.force_mri && '-mri' || '' }}
          path: ${{ steps.postprocess.outputs.log }}
          if-no-files-found: ignore

      - name: Upload backend log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testkit-stub-backend-log-${{ matrix.ruby }}${{ matrix.force_mri && '-mri' || '' }}
          path: /tmp/testkit-run-*/backend.log
          if-no-files-found: ignore
