name: Testkit (stub)

on:
  push:
    branches: [main]
  pull_request:

env:
  # Pinned testkit ref. Bump intentionally. Promoted to workflow-level so
  # the boltstub cache key below can reference it (job-level env can't be
  # used inside cache keys at the step level).
  TESTKIT_REF: a233c3f32c9e7db33d856345c4c98f487d15aabb

jobs:
  testkit-stub:
    name: testkit-stub (ruby ${{ matrix.ruby }}${{ matrix.force_mri && ' [mri flavor]' || '' }})
    runs-on: ubuntu-latest
    # JRuby rows are continue-on-error: native JRuby flavor has no code
    # yet (lib/jruby/ empty), and the MRI-on-JRuby include row below is
    # exercised here for the first time.
    continue-on-error: ${{ startsWith(matrix.ruby, 'jruby') }}

    strategy:
      fail-fast: false
      matrix:
        ruby:
          - "3.4"
          - "jruby-10.1.0.0"
        force_mri: [false]
        include:
          - ruby: "jruby-10.1.0.0"
            force_mri: true

    env:
      TEST_DRIVER_NAME: ruby
      TESTKIT_PATH: ${{ github.workspace }}/../testkit
      # Per-impl baseline: MRI and JRuby progress independently.
      # The MRI-on-JRuby flavor uses the MRI baseline since it runs MRI code.
      BASELINE: ${{ github.workspace }}/.github/testkit-stub-baseline-${{ (startsWith(matrix.ruby, 'jruby') && !matrix.force_mri) && 'jruby' || 'mri' }}.txt
      # Empty string when force_mri is false; '1' on the include row.
      NEO4J_DRIVER_FORCE_MRI: ${{ matrix.force_mri && '1' || '' }}
      # Use the Rust boltstub (testkit/boltstub_rs) instead of the Python
      # implementation. Authors quote a 2-3× speedup on stub tests.
      # testkit/tests/stub/shared.py reads this env var; when truthy it
      # spawns the `boltstub` binary on PATH instead of `python -m boltstub`.
      TEST_RUSTY_STUB: 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Shallow-fetch just the pinned commit (no full history needed).
      - name: Clone testkit
        run: |
          git init "$TESTKIT_PATH"
          git -C "$TESTKIT_PATH" remote add origin https://github.com/neo4j-drivers/testkit.git
          git -C "$TESTKIT_PATH" fetch --depth 1 origin "$TESTKIT_REF"
          git -C "$TESTKIT_PATH" checkout FETCH_HEAD

      - name: Install testkit Python deps
        run: pip install -Ur "$TESTKIT_PATH/requirements.txt"

      # Cache the compiled Rust boltstub binary by testkit ref. Source is
      # frozen per ref, so we rebuild only when TESTKIT_REF is bumped.
      - name: Cache Rust boltstub binary
        id: cache-boltstub
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/boltstub
          key: boltstub-${{ runner.os }}-${{ env.TESTKIT_REF }}

      - name: Install Rust toolchain
        if: steps.cache-boltstub.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          # Matches testkit/boltstub_rs/rust-toolchain.toml; bump in lockstep.
          toolchain: '1.88'

      - name: Build Rust boltstub
        if: steps.cache-boltstub.outputs.cache-hit != 'true'
        # `--locked` pins to testkit's Cargo.lock for reproducible builds.
        run: cargo install --locked --path "$TESTKIT_PATH/boltstub_rs"

      # tests/stub uses an internal boltstub server (now the Rust one via
      # TEST_RUSTY_STUB), not a real Neo4j — no service container needed.
      - name: Run testkit stub suite
        id: testkit
        continue-on-error: true
        run: ./bin/run-testkit stub

      - uses: ./.github/actions/testkit-postprocess
        id: postprocess
        if: always()
        with:
          target_label: stub
          baseline_path: ${{ env.BASELINE }}

      - name: Upload run log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          # Suffix per-matrix-row so artifacts don't overwrite each other.
          # actions/upload-artifact@v4 errors on duplicate names rather than
          # silently merging, so distinct names are required.
          name: testkit-stub-run-log-${{ matrix.ruby }}${{ matrix.force_mri && '-mri' || '' }}
          path: ${{ steps.postprocess.outputs.log }}
          if-no-files-found: ignore

      - name: Upload backend log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testkit-stub-backend-log-${{ matrix.ruby }}${{ matrix.force_mri && '-mri' || '' }}
          path: /tmp/testkit-run-*/backend.log
          if-no-files-found: ignore
