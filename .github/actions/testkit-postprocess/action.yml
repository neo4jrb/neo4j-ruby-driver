name: Testkit postprocess
description: >
  Shared post-run gate for the testkit workflows: locate the run log and
  require the suite to be green. The verdict uses two independent signals —
  unittest's own end-of-run summary (which counts subTest failures
  correctly), and the run step's exit code (which catches a config that
  crashed before printing a summary) — not a baseline diff or inline scan.

inputs:
  target_label:
    description: Short label for step summaries (e.g. "stub" or "integration").
    required: true
  log_path:
    description: >
      Explicit path to the testkit run log. Set this when the workflow
      already knows where it wrote the log (e.g. `tee /tmp/run.log`).
      Empty default preserves the legacy auto-discovery for
      `bin/run-testkit`, which writes under `/tmp/testkit-run-*`.
    required: false
    default: ''
  run_outcome:
    description: >
      The `outcome` of the testkit run step (pass the run step's
      steps.<id>.outcome expression; the step is `continue-on-error`, so its
      true result survives). When it is "failure" the gate goes red even if the
      parsed summary shows no failures — this catches a config that crashed
      before emitting any unittest summary (a partial infra/boot failure the
      counts can't see). Empty (the default) skips the check, so local callers
      need not set it.
    required: false
    default: ''

outputs:
  log:
    description: Path to the testkit run.log.
    value: ${{ steps.log.outputs.path }}

runs:
  using: composite
  steps:
    # Explicit log_path wins; otherwise fall back to the legacy
    # bin/run-testkit convention of `/tmp/testkit-run-*/run.log`.
    - name: Locate run log
      id: log
      if: always()
      shell: bash
      run: |
        explicit="${{ inputs.log_path }}"
        if [ -n "$explicit" ]; then
          test -f "$explicit" || { echo "log not at $explicit"; exit 1; }
          path="$explicit"
        else
          path=$(ls -td /tmp/testkit-run-* 2>/dev/null | head -1)/run.log
          test -f "$path" || { echo "no run.log produced"; exit 1; }
        fi
        echo "path=$path" >> "$GITHUB_OUTPUT"

    # Require green: trust unittest's own accounting. It prints, once per
    # run (and the integration suite runs once per Neo4j config, so we SUM):
    #     Ran N tests in T
    #     OK | OK (skipped=S) | FAILED (failures=F, errors=E, skipped=S)
    # A subTest failure is counted in that summary (it is NOT emitted as an
    # inline " ... FAIL"), so summing failures= / errors= here catches the
    # subtest failures the old inline-token gate was blind to. Tokens are
    # matched anywhere on the line, not only after "^(OK|FAILED)", because an
    # interleaved stderr UserWarning (no trailing newline) can glue onto
    # "FAILED" and push its "(failures=..)" tail onto a later line. `Ran`
    # likewise (substr+coerce tolerates a glued prefix that would break $2).
    - name: Require green
      if: always()
      shell: bash
      run: |
        LOG="${{ steps.log.outputs.path }}"
        RUN_OUTCOME="${{ inputs.run_outcome }}"
        read -r RAN FAIL ERROR SKIP < <(awk '
          # No \b — POSIX awk (the CI runner default) does not support it.
          match($0, /Ran [0-9]+ tests?/) { ran += substr($0, RSTART + 4) + 0 }
          match($0, /failures=[0-9]+/)   { fail += substr($0, RSTART + 9, RLENGTH - 9) }
          match($0, /errors=[0-9]+/)     { err  += substr($0, RSTART + 7, RLENGTH - 7) }
          match($0, /skipped=[0-9]+/)    { skip += substr($0, RSTART + 8, RLENGTH - 8) }
          END { printf "%d %d %d %d\n", ran, fail, err, skip }
        ' "$LOG")

        # unittest prints each failing/erroring test (incl. the subTest
        # params) as a "FAIL:"/"ERROR:" block header — list them so a red
        # run is actionable straight from the step summary.
        FAILS=$(grep -E '^(FAIL|ERROR): ' "$LOG" || true)

        # Pass = executed-and-passed, i.e. excludes skips (unittest's "Ran N"
        # counts skipped tests, so report Pass separately — matches the old
        # Summarise-counts table).
        PASS=$((RAN - FAIL - ERROR - SKIP))

        {
          echo "## Testkit (${{ inputs.target_label }}) — require green"
          echo ""
          echo "| Pass | Fail | Error | Skip |"
          echo "|-----:|-----:|------:|-----:|"
          echo "| $PASS | $FAIL | $ERROR | $SKIP |"
          if [ -n "$FAILS" ]; then
            echo ""
            echo "### ❌ Failing tests"
            echo '```'
            echo "$FAILS"
            echo '```'
          fi
        } >> "$GITHUB_STEP_SUMMARY"

        echo "ran=$RAN failures=$FAIL errors=$ERROR skipped=$SKIP run_outcome=${RUN_OUTCOME:-<unset>}"

        # RAN == 0 means either no unittest summary was produced (the suite
        # crashed before reporting — infra / backend failure) or unittest ran
        # but selected 0 tests ("Ran 0 tests" — bad discovery / misconfig).
        # Both are red: a suite that executed nothing is never a pass.
        if [ "$RAN" -eq 0 ]; then
          echo "::error::0 tests executed — the suite crashed before reporting, or selected no tests (discovery/config error)"
          exit 1
        fi
        if [ "$FAIL" -gt 0 ] || [ "$ERROR" -gt 0 ]; then
          echo "::error::testkit ${{ inputs.target_label }} not green: $FAIL failure(s), $ERROR error(s)"
          echo "$FAILS" | sed 's/^/::error::/'
          exit 1
        fi
        # Second, independent signal: the run step's own exit code. The counts
        # above can read green if ONE config (e.g. an integration matrix entry)
        # crashes before printing a unittest summary while the others pass —
        # its failure adds nothing to failures= and, with the others reporting,
        # RAN stays > 0. testkit exiting non-zero catches exactly that. Only
        # enforced when the caller passes run_outcome (CI does; local runs
        # leave it empty).
        if [ "$RUN_OUTCOME" = "failure" ]; then
          echo "::error::testkit ${{ inputs.target_label }} run step exited non-zero even though the parsed summary showed no failures — a config likely crashed before reporting; inspect the run log"
          exit 1
        fi
        echo "Green: $PASS executed test(s) passed, $SKIP skipped (ran=$RAN)."
