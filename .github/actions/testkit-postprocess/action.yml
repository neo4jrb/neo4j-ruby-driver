name: Testkit postprocess
description: >
  Shared post-run steps for both testkit workflows: locate the run log,
  extract the passing-tests list, summarise counts, and run the
  regression gate. Centralises the log-parsing format so the stub and
  integration workflows can't drift.

inputs:
  target_label:
    description: Short label for step summaries (e.g. "stub" or "integration").
    required: true
  baseline_path:
    description: Absolute path to the impl-specific baseline file.
    required: true
  log_path:
    description: >
      Explicit path to the testkit run log. Set this when the workflow
      already knows where it wrote the log (e.g. `tee /tmp/run.log`).
      Empty default preserves the legacy auto-discovery for
      `bin/run-testkit`, which writes under `/tmp/testkit-run-*`.
    required: false
    default: ''

outputs:
  log:
    description: Path to the testkit run.log.
    value: ${{ steps.log.outputs.path }}
  pass_list:
    description: Path to a sorted file of unique passing test ids.
    value: ${{ steps.pass.outputs.path }}

runs:
  using: composite
  steps:
    # Explicit log_path wins; otherwise fall back to the legacy
    # bin/run-testkit convention of `/tmp/testkit-run-*/run.log`.
    - name: Locate run log
      id: log
      if: always()
      shell: bash
      run: |
        explicit="${{ inputs.log_path }}"
        if [ -n "$explicit" ]; then
          test -f "$explicit" || { echo "log not at $explicit"; exit 1; }
          path="$explicit"
        else
          path=$(ls -td /tmp/testkit-run-* 2>/dev/null | head -1)/run.log
          test -f "$path" || { echo "no run.log produced"; exit 1; }
        fi
        echo "path=$path" >> "$GITHUB_OUTPUT"

    # One place to define the "passing" log line format. Everything
    # downstream (counts, gate) consumes this file, so a future testkit
    # format tweak only needs an update here.
    # `sort -u` because testkit can list a single test id more than
    # once (parametrised cases shared between v3/v4 suites); duplicates
    # would otherwise surface as phantom "new passes" against the
    # baseline.
    # The awk handles two unittest output shapes:
    #   1) "<header> ... ok"                          — clean pass
    #   2) "<header> ... /path:N: UserWarning: ..."   — header split
    #      "  warnings.warn(...)"                       by a Python
    #      "ok"                                         warning, with
    #                                                   a bare "ok"
    #                                                   on its own line
    # Shape 2 surfaces whenever testkit's nutkit protocol code emits a
    # UserWarning during a test (e.g. backend-compat checks). A naive
    # ` \.\.\. ok$` grep silently drops those passes, which then look
    # like regressions against the baseline.
    - name: Extract pass list
      id: pass
      if: always()
      shell: bash
      run: |
        path=/tmp/testkit-pass-list.txt
        # Normalise headers to the canonical form
        #     test_x (module.Class.test_x)
        # The "inside the parens" piece changed across Python versions:
        #   Python 3.10-: "test_x (module.Class.test_x)" (with method)
        #   Python 3.11+: "test_x (module.Class)"        (no method)
        # Our baselines were generated with the older shape, and the
        # runner container that testkit's main.py spins up uses the
        # newer one. Appending ".<method>" when it's missing canonicalises
        # both shapes so the gate compares apples to apples regardless of
        # which Python ran the suite.
        awk '
          # POSIX awk only (gawk match-with-array form is not portable).
          # Local var "cl" instead of "close" — macOS awk reserves close.
          function canon(s,    op, cl, head, inner, suffix) {
            op = index(s, " (")
            if (!op) return s
            cl = length(s)
            if (substr(s, cl, 1) != ")") return s
            head = substr(s, 1, op - 1)
            inner = substr(s, op + 2, cl - op - 2)
            suffix = "." head
            if (length(inner) < length(suffix) ||
                substr(inner, length(inner) - length(suffix) + 1) != suffix) {
              return head " (" inner suffix ")"
            }
            return s
          }
          # Every result line is prefixed with the active testkit suite
          # name ("<suite>::<test_id>") so multi-config integration runs
          # can distinguish "passed under config A, failed under config B"
          # in the baseline file. Suite names come from the testkit
          # markers ("Stub tests", "TLS tests",
          # "Integration tests 4.4-enterprise-neo4j", …). Single-config
          # workflows look slightly noisier but the format is uniform.
          # No-suite lines (rare; should not occur in practice) drop the
          # "::" prefix.
          # No apostrophes in this comment block — the whole awk script
          # is in a bash single-quoted string and an embedded apostrophe
          # closes the string prematurely.
          function tag(s) { return suite ? suite "::" s : s }
          # When unittest emits multiple tests on one line (output buffer
          # race: "test_a (id1) ... test_b (id2) ... ok"), the trailing
          # result belongs to the LAST segment; the others completed
          # silently — and since the inline format only drops the result
          # token for passing tests that get merged this way, treat them
          # all as passes.
          # Filter to segments ending in ")" so that warning-text suffixes
          # ("/path:N: UserWarning: …" attached after the last " ... ")
          # are skipped without leaking into the pass list.
          function emit_pass(s,    n, parts, i) {
            n = split(s, parts, / \.\.\. /)
            for (i = 1; i <= n; i++)
              if (parts[i] ~ /\)$/) print tag(canon(parts[i]))
          }
          # For inline FAIL/ERROR/skipped: only the LAST test-header
          # segment is the failure / skip; merged earlier headers still
          # passed.
          function emit_pre_pass(s,    n, parts, i, last_idx) {
            n = split(s, parts, / \.\.\. /)
            last_idx = 0
            for (i = 1; i <= n; i++) if (parts[i] ~ /\)$/) last_idx = i
            for (i = 1; i < last_idx; i++)
              if (parts[i] ~ /\)$/) print tag(canon(parts[i]))
          }
          # Match the marker anywhere on the line — testkit's print
          # order sometimes glues it onto the tail of a preceding
          # subprocess line (no trailing newline on the prior write,
          # e.g. the docker run command list for a cluster's second
          # core). Take everything after the marker as the suite name.
          match($0, />>> Start test suite: /) { suite = substr($0, RSTART + RLENGTH); next }
          match($0, />>> End test suite: /)   { suite = ""; next }
          / \.\.\. ok$/      { sub(/ \.\.\. ok$/, ""); emit_pass($0); pending=""; next }
          / \.\.\. FAIL$/    { sub(/ \.\.\. FAIL$/, ""); emit_pre_pass($0); pending=""; next }
          / \.\.\. ERROR$/   { sub(/ \.\.\. ERROR$/, ""); emit_pre_pass($0); pending=""; next }
          / \.\.\. skipped/  { sub(/ \.\.\. skipped.*/, ""); emit_pre_pass($0); pending=""; next }
          # Warning-split / unfinished line: keep the WHOLE line as pending
          # so that on the eventual bare "ok"/"FAIL"/"ERROR" we can
          # recover every merged segment. emit_pass/emit_pre_pass drop
          # the warning-text tail via the ")"-suffix filter.
          / \.\.\. /         { pending=$0; next }
          /^ok$/             { if (pending) { emit_pass(pending); pending="" } }
          /^FAIL$/           { if (pending) { emit_pre_pass(pending); pending="" } }
          /^ERROR$/          { if (pending) { emit_pre_pass(pending); pending="" } }
        ' "${{ steps.log.outputs.path }}" | sort -u > "$path"
        echo "path=$path" >> "$GITHUB_OUTPUT"
        echo "$(wc -l < "$path") unique passing tests."

    - name: Summarise counts
      if: always()
      shell: bash
      run: |
        LOG="${{ steps.log.outputs.path }}"
        # Raw counts — every parametrised occurrence is its own
        # pass/fail/error result. The dedup'd unique-test-id count
        # used by the gate is reported separately below.
        # Count both shapes (inline " ... ok" and bare "ok" after a
        # warning-split header) so warnings don't make the totals lie.
        PASS=$(awk '/ \.\.\. ok$/ { c++; next } /^ok$/ { c++ } END { print c+0 }' "$LOG")
        FAIL=$(awk '/ \.\.\. FAIL$/ { c++; next } /^FAIL$/ { c++ } END { print c+0 }' "$LOG")
        ERROR=$(awk '/ \.\.\. ERROR$/ { c++; next } /^ERROR$/ { c++ } END { print c+0 }' "$LOG")
        SKIP=$(grep -cE 'skipped' "$LOG" || true)
        {
          echo "## Testkit (${{ inputs.target_label }}) results"
          echo ""
          echo "| Pass | Fail | Error | Skip |"
          echo "|-----:|-----:|------:|-----:|"
          echo "| $PASS | $FAIL | $ERROR | $SKIP |"
        } >> "$GITHUB_STEP_SUMMARY"

    # Mandatory gate. A baseline test regresses if:
    # - its test_id isn't in the current pass set, OR
    # - any parametrised occurrence of it failed (even if another
    #   occurrence passed). That second case catches "3 of 4 params
    #   ok + 1 FAIL" which the dedup'd pass set would otherwise hide.
    - name: Regression gate (baseline diff)
      if: always()
      shell: bash
      run: |
        LOG="${{ steps.log.outputs.path }}"
        # `set -e -o pipefail` (GH Actions default) treats `grep -v` with
        # zero matches as a pipeline failure. A baseline of only comments
        # and blank lines (legitimate state when no tests pass yet, e.g.
        # MRI's empty TLS baseline) would kill the whole gate before it
        # got a chance to compare. `|| true` makes the empty-input case
        # well-formed; the comm below still does the right thing with an
        # empty baseline.txt.
        { grep -vE '^[[:space:]]*(#|$)' "${{ inputs.baseline_path }}" || true; } \
          | sort -u > /tmp/baseline.txt
        # Same warning-split awareness as Extract pass list, plus the
        # canon() normalisation so Python 3.11+ output (no .test_method
        # inside the parens) matches baselines recorded under older
        # Python (which kept it).
        awk '
          # POSIX awk only (see Extract pass list for the same canon).
          function canon(s,    op, cl, head, inner, suffix) {
            op = index(s, " (")
            if (!op) return s
            cl = length(s)
            if (substr(s, cl, 1) != ")") return s
            head = substr(s, 1, op - 1)
            inner = substr(s, op + 2, cl - op - 2)
            suffix = "." head
            if (length(inner) < length(suffix) ||
                substr(inner, length(inner) - length(suffix) + 1) != suffix) {
              return head " (" inner suffix ")"
            }
            return s
          }
          # On a merged "test_a (id1) ... test_b (id2) ... FAIL" line, only
          # the LAST test-header segment is the failure — the earlier ones
          # passed. Find the rightmost segment ending in ")" so trailing
          # warning text (which never ends in ")") gets ignored.
          function last_paren_segment(s,    n, parts, i, last) {
            n = split(s, parts, / \.\.\. /)
            for (i = 1; i <= n; i++) if (parts[i] ~ /\)$/) last = parts[i]
            return last
          }
          # Suite-name prefix — matches Extract pass list above. The
          # baseline file is in "<suite>::<test_id>" form, so the fail
          # set must use the same form for `comm` to intersect.
          function tag(s) { return suite ? suite "::" s : s }
          # See Extract pass list comment above — same reason.
          match($0, />>> Start test suite: /) { suite = substr($0, RSTART + RLENGTH); next }
          match($0, />>> End test suite: /)   { suite = ""; next }
          / \.\.\. FAIL$/    { sub(/ \.\.\. FAIL$/, ""); print tag(canon(last_paren_segment($0))); pending=""; next }
          / \.\.\. ERROR$/   { sub(/ \.\.\. ERROR$/, ""); print tag(canon(last_paren_segment($0))); pending=""; next }
          / \.\.\. ok$/      { pending=""; next }
          / \.\.\. skipped/  { pending=""; next }
          # Warning-split line: keep WHOLE line as pending so we can
          # recover the right header on the eventual bare result.
          / \.\.\. /         { pending=$0; next }
          /^FAIL$/           { if (pending) { print tag(canon(last_paren_segment(pending))); pending="" } }
          /^ERROR$/          { if (pending) { print tag(canon(last_paren_segment(pending))); pending="" } }
          /^ok$/             { pending="" }
        ' "$LOG" | sort -u > /tmp/current-fail.txt

        MISSING=$(comm -23 /tmp/baseline.txt "${{ steps.pass.outputs.path }}")
        FAILED=$(comm -12 /tmp/baseline.txt /tmp/current-fail.txt)
        # awk 'NF' to drop empty lines without grep — grep -vE '^$'
        # returns 1 when nothing matches, and bash 4.4+ propagates that
        # through `$(...)` under `set -e`, killing the script silently.
        REGRESSED=$( { echo "$MISSING"; echo "$FAILED"; } | awk 'NF' | sort -u )
        NEW=$(comm -13 /tmp/baseline.txt "${{ steps.pass.outputs.path }}")

        {
          echo ""
          if [ -n "$NEW" ]; then
            echo "### ✅ New passing tests (not yet in baseline)"
            echo ""
            echo "Run \`bin/refresh-testkit-baseline ${{ inputs.target_label == 'stub' && 'stub' || 'neo4j' }}\` locally and commit to fold these in."
            echo '```'
            echo "$NEW"
            echo '```'
          fi
          if [ -n "$REGRESSED" ]; then
            echo "### ❌ Regressed tests (previously in baseline, now not passing or failed for at least one parameter set)"
            echo '```'
            echo "$REGRESSED"
            echo '```'
          fi
        } >> "$GITHUB_STEP_SUMMARY"

        if [ -n "$REGRESSED" ]; then
          echo "::error::$(echo "$REGRESSED" | wc -l | tr -d ' ') baseline test(s) regressed"
          echo "$REGRESSED" | sed 's/^/::error::regressed: /'
          exit 1
        fi
        echo "All baseline tests still pass for every parameter set."
